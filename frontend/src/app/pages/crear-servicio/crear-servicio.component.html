<nav class="navbar-chambee position-relative px-4">
  <div class="d-flex align-items-center ms-2 logo-wrapper" routerLink="/" style="cursor: pointer;">
    <div class="d-flex align-items-center gap-2">
      <img src="assets/LogoChambee.png" alt="Chambee" height="40" style="object-fit: contain;">
      <span class="fs-4 fw-bold text-dark" style="letter-spacing: -0.5px;">Chambee</span>
    </div>
  </div>

  <div class="search-container d-none d-md-flex position-absolute start-50 translate-middle-x">
    <input type="text" placeholder="Buscar, categoría, puesto, ciudad y más...">
  </div>

  <div class="nav-buttons d-flex align-items-center gap-2 ms-auto">
    <div class="notification-bell text-dark fs-4 position-relative mx-1" role="button">
      <i class="bi bi-bell-fill"></i>
      <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle" style="margin-top: 8px; margin-left: -4px;"></span>
    </div>
    
    <button class="btn-profile mx-1" (click)="irAlPerfil()">
      <i class="bi bi-person-circle fs-4"></i>
      <span class="d-none d-xl-block">Mi Perfil</span>
    </button>

    <button class="theme-toggle mx-1" type="button" (click)="toggleTheme()">
      <span class="theme-toggle-track">
        <span class="theme-toggle-icon">{{ isDarkMode ? '☾' : '☀' }}</span>
      </span>
    </button>

    <div class="menu text-dark fs-2 ms-1" role="button" style="cursor: pointer; display: flex; align-items: center;">
      <i class="bi bi-list"></i>
    </div>
  </div>
</nav>

<div class="main-wrapper pb-5">
  <div class="container mt-4">
    
    <form [formGroup]="servicioForm" (ngSubmit)="publicar()" class="row g-4 m-0">
      
      <div class="col-md-8">
        <div class="card card-chambee p-4 p-md-5">
          <div class="d-flex align-items-center gap-3 mb-4 header-section-title">
              <div class="icon-circle shadow-sm">
                <i class="bi bi-tools fs-5"></i>
              </div>
              <h4 class="fw-bold m-0">Información del servicio</h4>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <label class="form-label font-weight-bold">Nombre del servicio que necesitas</label>
              <input type="text" formControlName="title" class="form-control chambee-input" placeholder="Ej. Reparación de fuga de agua">
              <small class="text-danger" *ngIf="servicioForm.get('title')?.invalid && servicioForm.get('title')?.touched">Requerido</small>
            </div>
            <div class="col-md-6 mb-4">
              <label class="form-label font-weight-bold">Categoría de oficio</label>
              <select formControlName="categoria" class="form-select chambee-input">
                <option value="Plomería">Plomería</option>
                <option value="Electricidad">Electricidad</option>
                <option value="Carpintería">Carpintería</option>
                <option value="Limpieza">Limpieza</option>
              </select>
            </div>
          </div>

          <div class="row">
            <div class="col-md-6 mb-4">
              <label class="form-label font-weight-bold">Presupuesto estimado (MXN)</label>
              <input type="number" formControlName="presupuesto" class="form-control chambee-input" placeholder="$ 500">
            </div>
            <div class="col-md-6 mb-4">
               <label class="form-label font-weight-bold">Ubicación del trabajo</label>
               <div class="input-group overflow-hidden rounded-3 form-group-location">
                  <input type="text" formControlName="ubicacion" class="form-control border-0 bg-transparent py-3 text-input-location" placeholder="San Miguel de Allende, Gto">
                  <span class="input-group-text border-0 bg-transparent icon-location"><i class="bi bi-geo-alt-fill"></i></span>
               </div>
            </div>
          </div>

          <div class="mt-2">
            <label class="form-label font-weight-bold">Descripción detallada de lo que solicitas</label>
            <textarea formControlName="description" class="form-control chambee-input" rows="8" placeholder="Describe el problema, qué necesitas que hagan y cualquier detalle importante..."></textarea>
            <small class="text-danger" *ngIf="servicioForm.get('description')?.invalid && servicioForm.get('description')?.touched">Requerido</small>
          </div>
        </div>
      </div>

      <div class="col-md-4 side-cards">
        <div class="card card-chambee p-4 side-card-yellow mb-4">
          <h5 class="fw-bold m-0 card-title-dark">Estado de la Solicitud</h5>
          <div class="d-flex justify-content-between align-items-center mt-3 pt-2">
            <span class="fw-semibold text-muted-custom">Visible para Oficios</span>
            <div class="form-check form-switch fs-4 m-0">
              <input class="form-check-input switch-success" type="checkbox" checked>
            </div>
          </div>
        </div>

        <div class="card card-chambee p-4 side-card-yellow">
          <h5 class="fw-bold mb-3 card-title-dark">Etiquetas de búsqueda</h5>
          <div class="d-flex flex-wrap gap-2 mb-3">
            <span class="badge badge-custom px-3 py-2 rounded-pill fw-bold">#Hogar</span>
            <span class="badge badge-custom px-3 py-2 rounded-pill fw-bold">#Urgente</span>
            <span class="badge badge-custom px-3 py-2 rounded-pill fw-bold">#Reparación</span>
          </div>
          <input type="text" class="form-control chambee-input p-2" placeholder="Añadir etiqueta...">
        </div>
      </div>

      <div class="col-12 d-flex justify-content-center gap-3 mt-5">
        <button type="button" class="btn btn-secondary rounded-pill px-5 py-3 fw-bold border-0 shadow-sm btn-cancel-custom" routerLink="/home-user">
          Cancelar
        </button>
        <button type="submit" class="btn btn-warning rounded-pill px-5 py-3 fw-bold shadow-sm text-dark btn-publish-custom">
          Publicar Servicio
        </button>
      </div>
      
    </form>
    
  </div>
</div>
