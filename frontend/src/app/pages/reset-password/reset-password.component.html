<div class="page-layout">
  <header class="navbar-chambee">
    <img src="assets/LogoChambee.png" alt="Logo" class="nav-logo" routerLink="/">
  </header>

  <main class="content-container">
    <div class="glass-card">
      <button class="close-icon" type="button" routerLink="/login">×</button>
      
      <div class="bee-header">
        <img src="assets/Chambee_login.png" alt="Abeja" class="bee-img">
      </div>

      <p class="instruction-text">Restablecer contraseña</p>

      <form class="chambee-form">
        <input type="password" placeholder="Nueva contraseña:" class="chambee-input">
        <input type="password" placeholder="Confirmar contraseña:" class="chambee-input">
        
        <div class="actions-stack">
          <button type="submit" class="btn-white">Guardar nueva contraseña</button>
        </div>
      </form>
    </div>
  </main>
</div>
