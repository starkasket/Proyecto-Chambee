<nav class="navbar-chambee d-flex align-items-center justify-content-between px-4">
  <div class="d-flex align-items-center gap-2">
    <img src="assets/LogoChambee.png" alt="Chambee" height="60">
  </div>
</nav>

<div class="page-bg">
  <div class="fondo-registro-card">
    <div class="registro-card" style="max-width: 600px; padding: 40px;">

      <!-- MODAL DE ERROR -->
<div id="modalAlerta" class="modal" tabindex="-1"
>  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-center">
      <div class="modal-body pt-4">
        <img src="assets/abejaMigajera.png" alt="alerta" height="200px" class="mb-3"/>
        <h5 class="text-danger fw-bold">¡Atención!</h5>
        <p class="mb-0">{{ modalMensaje }}</p>
      </div>
      <div class="modal-footer border-0 justify-content-center pb-4">
        <button type="button" class="btn btn-warning px-4" (click)="cerrarModal()">Aceptar</button>
      </div>
    </div>
  </div>
</div>
      
      <div class="text-center mb-4 mt-2">
        <h3 class="fw-bold" style="color: #2c3e50;">¿En qué áreas te gustaría trabajar?</h3>
        <p class="text-muted mt-2">Selecciona tus intereses para mostrarte las mejores opciones.</p>
      </div>

      <div class="d-flex flex-wrap justify-content-center gap-3 mb-5 mt-4">
        <button 
          *ngFor="let tag of tags" 
          class="btn rounded-pill px-4 py-2 custom-tag d-flex align-items-center gap-2"
          [class.active-tag]="selectedTags.includes(tag)"
          (click)="toggleTag(tag)">
          <span>{{ tag }}</span>
          <span class="simbolo-amarillo fw-bold fs-5">+</span>
        </button>
      </div>

      <div class="d-flex flex-column align-items-center mt-2 gap-2">
        
        <button class="btn-crear w-100" type="button" (click)="saveAndContinue()">
          Hecho
        </button>

        <button class="btn btn-link text-secondary text-decoration-none mt-2" (click)="skipPreferences()">
          Omitir por ahora
        </button>
        
      </div>

    </div>
  </div>
</div>
