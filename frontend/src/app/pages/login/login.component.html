<div class="login-page">
  <header class="top-nav">
    <div class="logo-container">
      <img src="assets/LogoChambee.png" alt="Logo" class="nav-logo" routerLink="/" style="cursor: pointer;">
    </div>
  </header>

  <main class="login-container">
    <div class="login-card">
      <button class="close-btn" routerLink="/">×</button>
      
      <div class="logo-section">
        <img src="assets/Chambee_login.png" alt="Chambee" class="bee-img">
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
        <div class="input-group">
          <input type="email" formControlName="email" placeholder="Correo">
        </div>

        <div class="input-group">
          <input type="password" formControlName="password" placeholder="Contraseña">
        </div>

        <div class="options">
          <label class="remember-me">
            <input type="checkbox" formControlName="remember"> 
            <span>Recordar Sesion</span>
          </label>
        </div>

        <div class="forgot-password">
          <a routerLink="/forgot-password">¿Olvidé mi contraseña?</a>
        </div>

        <div class="button-group">
          <button type="submit" class="btn-login-main">Iniciar Sesion</button>
          <button type="button" class="btn-register-main" routerLink="/register">Registrar</button>
        </div>
      </form>
    </div>

    <button class="admin-btn">Administrador</button>
  </main>
</div>
